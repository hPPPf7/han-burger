name: Release Desktop App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HAN_BURGER_GOOGLE_CLIENT_ID: ${{ secrets.HAN_BURGER_GOOGLE_CLIENT_ID }}
          HAN_BURGER_GOOGLE_CLIENT_SECRET: ${{ secrets.HAN_BURGER_GOOGLE_CLIENT_SECRET }}
        run: npm run release:github
